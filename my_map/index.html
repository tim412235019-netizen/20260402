<!DOCTYPE html>
<html>
<head>
    <title>嘉義市氣候溫度情境模擬</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6.5.0/turf.min.js"></script>

    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        
        .controls { 
            position: absolute; top: 10px; left: 50px; z-index: 1000; 
            background: rgba(255, 255, 255, 0.95); padding: 12px; 
            border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.3); 
            font-family: "Microsoft JhengHei", sans-serif;
            width: 220px;
        }
        .controls button { 
            cursor: pointer; padding: 6px 0; margin-bottom: 8px; 
            width: 48%; font-weight: bold; border: 1px solid #ccc;
            background: white; border-radius: 4px;
        }
        .controls button:hover { background: #e9ecef; }
        .controls select {
            padding: 6px; margin-bottom: 8px; width: 100%;
            cursor: pointer; border-radius: 4px; border: 1px solid #ccc;
            font-family: "Microsoft JhengHei", sans-serif; font-size: 13px;
        }

        .info-legend {
            padding: 12px; background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 10px rgba(0,0,0,0.3); border-radius: 8px;
            max-width: 260px; font-family: "Microsoft JhengHei", sans-serif;
        }
        .toggle-btn { 
            background: #f8f9fa; border: 1px solid #ccc; border-radius: 3px; 
            cursor: pointer; padding: 2px 6px; font-size: 12px; float: right; 
        }
        #legend-content { margin-top: 5px; display: block; line-height: 1.6; }
        
        .colorbar-legend {
            padding: 10px; background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 10px rgba(0,0,0,0.3); border-radius: 5px;
            width: 180px; font-family: "Microsoft JhengHei", sans-serif;
        }
        .colorbar-title { font-size: 13px; font-weight: bold; margin-bottom: 8px; text-align: center; }
        .gradient-bar { height: 15px; width: 100%; border-radius: 2px; border: 1px solid #999; }
        .high-gradient { background: linear-gradient(to right, #fee0d2, #de2d26); }
        .low-gradient { background: linear-gradient(to right, #deebf7, #3182bd); }
        .bar-labels { display: flex; justify-content: space-between; font-size: 11px; margin-top: 3px; font-weight: bold; }
        .village-control {
            background: white;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            font-family: "Microsoft JhengHei", sans-serif;
            min-width: 150px;
            }
        .village-control select {
            width: 100%;
            padding: 5px;
            margin-top: 5px;
        cursor: pointer;
        }
        
#map { 
    height: 100vh; 
    height: 100dvh; 
    width: 100%; 
    z-index: 1; 
}

@media (max-width: 768px) {
    .controls { 
        left: 10px; top: 10px; width: 150px; padding: 8px; font-size: 11px; 
    }
    
    .info-legend, .colorbar-legend { 
        max-width: 130px; 
        transform: scale(0.85); 
        transform-origin: bottom left; 
    }
    .colorbar-legend { 
        transform-origin: bottom right; 
    }
    .info-legend p { display: none; }

    .village-control {
        min-width: 120px;
        padding: 8px;
        transform: scale(0.85);
        transform-origin: top right;
        margin-top: 10px;
        margin-right: 10px;
    }
    .village-control div {
        font-size: 11px !important; 
    }
    .village-control select {
        padding: 4px;
        font-size: 11px; 
    }
}
    </style>
</head>
<body>

    <div class="controls">
    <div style="display: flex; justify-content: space-between;">
        <button onclick="getLocation()">📍 定位</button>
        <button onclick="goHome()">🏠 返回</button>
    </div>
    <hr style="border: 0; border-top: 1px solid #ddd; margin: 5px 0 10px 0;">
    
    <div style="font-weight:bold; font-size:13px; margin-bottom:5px;">🗺️ 底圖選擇</div>
    <select id="basemap-select" onchange="changeBaseLayer(this.value)">
        <option value="esri" selected>🛰️ 衛星影像</option>
        <option value="osm">🛣️ 街道地圖</option>
    </select>

    <div style="font-weight:bold; font-size:13px; margin-bottom:5px;">⚙️ 情境與時間</div>
    <select id="time-select" onchange="updateClimateLayer()">
        <option value="Short" selected> 短期 (2021-2040)</option>
        <option value="Mid"> 中期 (2041-2060)</option>
        <option value="Long"> 長期 (2081-2100)</option>
    </select>

    <select id="ssp-select" onchange="updateClimateLayer()">
        <option value="126" selected>SSP126</option>
        <option value="245">SSP245</option>
        <option value="370">SSP370</option>
        <option value="585">SSP585</option>
    </select>
    
    <select id="type-select" onchange="updateClimateLayer()">
        <option value="high" selected>🌡️ 高溫日數</option>
        <option value="low">❄️ 低溫日數</option>
    </select>
    </div>
    <div id="map"></div>

    <script>
        var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OSM' });
        var esri = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: '© Esri' });

        var groups = {
            Short: { high: {}, low: {} },
            Mid:   { high: {}, low: {} },
            Long:  { high: {}, low: {} }
        };

        ["Short", "Mid", "Long"].forEach(p => {
            ["high", "low"].forEach(t => {
                ["126", "245", "370", "585"].forEach(s => {
                    groups[p][t][s] = L.layerGroup();
                });
            });
        });

        var map = L.map('map', { 
            center: [23.48, 120.45], 
            zoom: 13, 
            layers: [esri] 
        });

        map.createPane('climatePane');
        map.getPane('climatePane').style.zIndex = 650; 
        map.getPane('climatePane').style.pointerEvents = 'none';

        var villageLayer; 
        var highlightLayer = L.layerGroup().addTo(map);

        function changeBaseLayer(type) {
        if (type === 'osm') {
        map.addLayer(osm);
        map.removeLayer(esri);
        } else {
        map.addLayer(esri);
        map.removeLayer(osm);
        }
        }

        fetch('chiayi_boundary.geojson')
        .then(res => res.json())
        .then(data => {
            villageLayer = data; 

            L.geoJSON(data, {
                style: { color: "#333", weight: 1, fill: false, opacity: 0.2, pointerEvents: 'none' }
            }).addTo(map);
        });

        var villageControl = L.control({position: 'topright'});
        villageControl.onAdd = function() {
            
            var div = L.DomUtil.create('div', 'village-control'); 
            div.innerHTML = `
                <div style="font-weight:bold; font-size:13px; margin-bottom:5px;">🔍 行政區快搜</div>
                <select id="district-select" onchange="updateVillageDropdown(this.value)">
                    <option value="">-- 請選擇區 --</option>
                    <option value="東區">東區</option>
                    <option value="西區">西區</option>
                </select>
                <select id="village-search-select" onchange="zoomToVillage(this.value)" disabled>
                    <option value="">-- 請先選擇區 --</option>
                </select>
            `;
            L.DomEvent.disableClickPropagation(div);
            return div;
        };
        villageControl.addTo(map);

        function updateVillageDropdown(districtName) {
            var vSelect = document.getElementById('village-search-select');
            vSelect.innerHTML = '<option value="">-- 請選擇里別 --</option>';
            
            if (!districtName) {
                vSelect.disabled = true;
                vSelect.innerHTML = '<option value="">-- 請先選擇區 --</option>';
                highlightLayer.clearLayers(); 
                return;
            }

            var filteredVillages = villageLayer.features.filter(function(f) {
                return f.properties.TOWNNAME === districtName || f.properties.DISTRICT === districtName;
            });

            var names = filteredVillages.map(f => f.properties.VILLNAME).sort();

            if (names.length > 0) {
                vSelect.disabled = false;
                names.forEach(name => {
                    var opt = document.createElement('option');
                    opt.value = name;
                    opt.innerHTML = name;
                    vSelect.appendChild(opt);
                });
            }
        }

        function highlightVillage(villageName, isZoom) {
            highlightLayer.clearLayers();

            L.geoJSON(villageLayer, {
                filter: function(f) { return f.properties.VILLNAME === villageName; },
                style: { 
                    color: "#FFFFFF", 
                    weight: 12,       
                    fill: true, 
                    fillOpacity: 0.1, 
                    pointerEvents: 'none' 
                }
            }).addTo(highlightLayer);

            var target = L.geoJSON(villageLayer, {
                filter: function(f) { return f.properties.VILLNAME === villageName; },
                style: { 
                    color: "#00FF00", 
                    weight: 8,       
                    fill: false, 
                    dashArray: '10, 10',
                    pointerEvents: 'none' 
                }
            }).addTo(highlightLayer);

            if (isZoom && target.getBounds().isValid()) {
                map.fitBounds(target.getBounds(), { padding: [20, 20] }); 
            }
        }

        function zoomToVillage(name) {
            if (!name) {
                highlightLayer.clearLayers();
                return;
            }
            highlightVillage(name, true);
        }

        var colorScaleHigh = d3.scaleSequential(d3.interpolateReds);
        var colorScaleLow = d3.scaleSequential(d3.interpolateBlues);

        function processAndRender(data, fieldName, colorScale, group) {
            const values = data.features.map(f => f.properties[fieldName]).filter(v => v != null);
            if (values.length > 0) {
                colorScale.domain([Math.min(...values), Math.max(...values)]);
            }

            L.geoJSON(data, {
                pane: 'climatePane',
                style: function (f) {
                    return {
                        fillColor: colorScale(f.properties[fieldName]),
                        weight: 0.5, 
                        opacity: 0.5, 
                        color: 'white', 
                        fillOpacity: 0.7
                    };
                },
                onEachFeature: function (f, l) {
                    l.on('click', function(e) {
                        var vName = f.properties.里名 || f.properties.VILLNAME; 
        
                        if (!vName && villageLayer) {
                            var pt = turf.point([e.latlng.lng, e.latlng.lat]); 
                            for (var i = 0; i < villageLayer.features.length; i++) {
                                var poly = villageLayer.features[i];
                                if (turf.booleanPointInPolygon(pt, poly)) {
                                    vName = poly.properties.VILLNAME || poly.properties.里名;
                                    break;
                                }
                            }
                        }

                        if (vName) {
                            highlightVillage(vName, false); 
                    
                            var matchedVillage = villageLayer.features.find(vf => vf.properties.VILLNAME === vName);
                            if (matchedVillage) {
                                var distName = matchedVillage.properties.TOWNNAME || matchedVillage.properties.DISTRICT;
                                if (distName) {
                                    var distSelect = document.getElementById('district-select');
                                    
                                    if(distSelect && distSelect.value !== distName) {
                                        distSelect.value = distName;
                                        updateVillageDropdown(distName);
                                    }
                                }
                            }
                            var vSelect = document.getElementById('village-search-select');
                            if(vSelect) vSelect.value = vName;
                        }

                        L.popup()
                            .setLatLng(e.latlng) 
                            .setContent(`<b>${vName || '邊界外點位'}</b><br>預估天數: ${f.properties[fieldName]} 天`)
                            .openOn(map);
                    });
                }
            }).addTo(group);
        }

        const datasets = [
            { file: 'SSP126_Short_21_40_high.geojson', period: 'Short', type: 'high', ssp: '126', scale: colorScaleHigh },
            { file: 'SSP245_Short_21_40_high.geojson', period: 'Short', type: 'high', ssp: '245', scale: colorScaleHigh },
            { file: 'SSP370_Short_21_40_high.geojson', period: 'Short', type: 'high', ssp: '370', scale: colorScaleHigh },
            { file: 'SSP585_Short_21_40_high.geojson', period: 'Short', type: 'high', ssp: '585', scale: colorScaleHigh },
            { file: 'SSP126_Short_21_40_low.geojson',  period: 'Short', type: 'low',  ssp: '126', scale: colorScaleLow },
            { file: 'SSP245_Short_21_40_low.geojson',  period: 'Short', type: 'low',  ssp: '245', scale: colorScaleLow },
            { file: 'SSP370_Short_21_40_low.geojson',  period: 'Short', type: 'low',  ssp: '370', scale: colorScaleLow },
            { file: 'SSP585_Short_21_40_low.geojson',  period: 'Short', type: 'low',  ssp: '585', scale: colorScaleLow },
            { file: 'SSP126_Mid_41_60_high.geojson',   period: 'Mid',   type: 'high', ssp: '126', scale: colorScaleHigh },
            { file: 'SSP245_Mid_41_60_high.geojson',   period: 'Mid',   type: 'high', ssp: '245', scale: colorScaleHigh },
            { file: 'SSP370_Mid_41_60_high.geojson',   period: 'Mid',   type: 'high', ssp: '370', scale: colorScaleHigh },
            { file: 'SSP585_Mid_41_60_high.geojson',   period: 'Mid',   type: 'high', ssp: '585', scale: colorScaleHigh },
            { file: 'SSP126_Mid_41_60_low.geojson',    period: 'Mid',   type: 'low',  ssp: '126', scale: colorScaleLow },
            { file: 'SSP245_Mid_41_60_low.geojson',    period: 'Mid',   type: 'low',  ssp: '245', scale: colorScaleLow },
            { file: 'SSP370_Mid_41_60_low.geojson',    period: 'Mid',   type: 'low',  ssp: '370', scale: colorScaleLow },
            { file: 'SSP585_Mid_41_60_low.geojson',    period: 'Mid',   type: 'low',  ssp: '585', scale: colorScaleLow },
            { file: 'SSP370_Long_81_00_high.geojson',  period: 'Long',  type: 'high', ssp: '370', scale: colorScaleHigh },
            { file: 'SSP370_Long_81_00_low.geojson',   period: 'Long',  type: 'low',  ssp: '370', scale: colorScaleLow }
        ];

        datasets.forEach(d => {
            fetch(d.file).then(res => res.json()).then(data => {
                processAndRender(data, 'days', d.scale, groups[d.period][d.type][d.ssp]);
            }).catch(e => console.log(d.file + " 資料未就緒"));
        });

        var legend = L.control({position: 'bottomleft'});
        legend.onAdd = function () {
            var div = L.DomUtil.create('div', 'info-legend');
            div.innerHTML = `
                <button class="toggle-btn" onclick="toggleLegend()">➖ 收合</button>
                <h4>嘉義市氣候溫度情境說明</h4>
                <div id="legend-content">
                <b>模式：TaiESM1</b><br>
                <b>短/中期情境:ssp126/ ssp245/ ssp370/ ssp585<br>
                <b>長期情境:ssp370</b>
                <br>嘉義市韌性防災計畫-中正大學學研團隊製。<br>
                <hr>
                <p>🔴 <b>高溫日數</b>：指該區域日最高溫大於35°C的平均天數。</p>
                <p>🔵 <b>低溫日數</b>：指該區域日最低溫小於15°C的平均天數。</p>
                <small>資料來源：TCCIP AR6 1km網格日資料</small><br>
                <small><b>#分析結果僅供參考</b></small>
        </div>`;

            L.DomEvent.disableClickPropagation(div);
            return div;
        };
        legend.addTo(map);

        var colorBar = L.control({position: 'bottomright'});
        colorBar.onAdd = function () {
            var div = L.DomUtil.create('div', 'colorbar-legend');
            div.innerHTML = `
                <div id="high-bar-box" style="display:block;">
                    <div class="colorbar-title">🌡️ 高溫預估天數色階</div>
                    <div class="gradient-bar high-gradient"></div>
                    <div class="bar-labels">
                        <span id="h-min-val">--</span><span>(天)</span><span id="h-max-val">--</span>
                    </div>
                </div>
                <div id="low-bar-box" style="display:none;">
                    <div class="colorbar-title">❄️ 低溫預估天數色階</div>
                    <div class="gradient-bar low-gradient"></div>
                    <div class="bar-labels">
                        <span id="l-min-val">--</span><span>(天)</span><span id="l-max-val">--</span>
                    </div>
                </div>`;
            return div;
        };
        colorBar.addTo(map);

        function updateClimateLayer() {
            var time = document.getElementById('time-select').value;
    var sspSelect = document.getElementById('ssp-select');
    var sspOptions = sspSelect.options; 

    if (time === 'Long') {
        for (var i = 0; i < sspOptions.length; i++) {
            if (sspOptions[i].value !== '370') {
                sspOptions[i].disabled = true;  
                sspOptions[i].text = sspOptions[i].value + " (無資料)"; 
            } else {
                sspOptions[i].disabled = false;
                sspOptions[i].selected = true; 
                sspOptions[i].text = "SSP" + sspOptions[i].value;
            }
        }
        } else {
            for (var i = 0; i < sspOptions.length; i++) {
            sspOptions[i].disabled = false;
            sspOptions[i].text = "SSP" + sspOptions[i].value;
            }
        }

        var ssp  = sspSelect.value; 
        var type = document.getElementById('type-select').value;

        Object.keys(groups).forEach(p => {
            Object.keys(groups[p]).forEach(t => {
            Object.keys(groups[p][t]).forEach(s => {
                map.removeLayer(groups[p][t][s]);
            });
            });
            });

        var target = groups[time][type][ssp];
        if (target) {
        map.addLayer(target);
        updateColorBar(target, type); 
        }
        }

        function updateColorBar(group, type) {
            var layers = group.getLayers();
            if (layers.length > 0) {
                var feats = layers[0].toGeoJSON().features;
                var vs = feats.map(f => f.properties.days).filter(v => v != null);
                if (vs.length > 0) {
                    var minV = Math.min(...vs).toFixed(1), maxV = Math.max(...vs).toFixed(1);
                    if (type === 'high') {
                        document.getElementById('high-bar-box').style.display = 'block';
                        document.getElementById('low-bar-box').style.display = 'none';
                        document.getElementById('h-min-val').innerText = minV;
                        document.getElementById('h-max-val').innerText = maxV;
                    } else {
                        document.getElementById('low-bar-box').style.display = 'block';
                        document.getElementById('high-bar-box').style.display = 'none';
                        document.getElementById('l-min-val').innerText = minV;
                        document.getElementById('l-max-val').innerText = maxV;
                    }
                }
            }
        }

        function goHome() {
            map.flyTo([23.48, 120.45], 13);
            
            document.getElementById('ssp-select').value = "126";
            document.getElementById('type-select').value = "high";
            document.getElementById('basemap-select').value = "esri";
            document.getElementById('time-select').value = "Short";
            changeBaseLayer('esri');

            var sspOptions = document.getElementById('ssp-select').options;
            for (var i = 0; i < sspOptions.length; i++) {
            sspOptions[i].disabled = false;
            sspOptions[i].text = "SSP" + sspOptions[i].value;
            }
            updateClimateLayer();

            var dSelect = document.getElementById('district-select');
            if(dSelect) dSelect.value = "";
            
            var vSelect = document.getElementById('village-search-select');
            if(vSelect) {
                vSelect.innerHTML = '<option value="">-- 請先選擇區 --</option>';
                vSelect.disabled = true;
            }

            highlightLayer.clearLayers();
            map.closePopup();
        }

        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    var lat = pos.coords.latitude;
                    var lon = pos.coords.longitude;
                    L.marker([lat, lon]).addTo(map).bindPopup("您目前的 GPS 位置").openPopup();
                    map.setView([lat, lon], 15);
                }, () => alert("無法取得位置，請檢查設備設定。"));
            }
        }

        function toggleLegend() {
            var c = document.getElementById("legend-content");
            var b = document.querySelector(".toggle-btn");
            if (c.style.display === "none") {
                c.style.display = "block";
                b.innerHTML = "➖ 收合";
            } else {
                c.style.display = "none";
                b.innerHTML = "➕ 展開";
            }
        }

        setTimeout(updateClimateLayer, 800);

        window.onload = function() {
        if (window.innerWidth < 768) {
            toggleLegend(); 
          }
        };
    </script>
</body>
</html>
