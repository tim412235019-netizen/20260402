<!DOCTYPE html>
<html>
<head>
    <title>嘉義市氣候溫度情境模擬</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6.5.0/turf.min.js"></script>

    <style>
        body { margin: 0; padding: 0; background: #f8fafc; font-family: "Microsoft JhengHei", sans-serif; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        
        .controls { 
            position: absolute; top: 15px; left: 60px; z-index: 1000; 
            background: white; padding: 15px; border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.15); width: 250px; 
        }
        .controls select { 
            padding: 8px; margin-bottom: 10px; width: 100%; border-radius: 6px; 
            border: 1px solid #ddd; font-size: 13px; cursor: pointer; 
        }
        .controls button { 
            cursor: pointer; padding: 8px 0; margin-bottom: 10px; 
            width: 48%; font-weight: bold; border: 1px solid #cbd5e0; 
            background: #fff; border-radius: 6px; 
        }
        .controls button:hover { background: #e9ecef; }

        .village-control { 
            background: #fff; padding: 15px; border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.2); border: 1px solid #e2e8f0; min-width: 150px; 
        }
        .village-control b { color: #1e293b; display: block; margin-bottom: 8px; border-left: 4px solid #2563eb; padding-left: 8px; }
        .village-control select { width: 100%; padding: 6px; border-radius: 6px; border: 1px solid #cbd5e0; font-size: 13px; margin-bottom: 5px; cursor: pointer; }

        .info-legend { 
            position: fixed; bottom: 25px; left: 15px; width: 380px; z-index: 9999; 
            background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
            transition: all 0.3s ease; /* 增加過場動畫 */
        }
        /* 當面板處於收合狀態時的專屬樣式 */
        .info-legend.collapsed {
            width: max-content; 
            border-radius: 30px;
        }
        .legend-header { 
            background: #0f172a; padding: 15px 20px; color: white; display: flex; 
            justify-content: space-between; align-items: center; cursor: pointer;
            border-radius: 15px 15px 0 0; transition: all 0.3s ease;
        }
        .info-legend.collapsed .legend-header {
            border-radius: 30px; /* 收合時變成膠囊狀 */
            padding: 10px 20px;
        }
        
        #main-content { padding: 20px; max-height: 60vh; overflow-y: auto; }
        .edu-section { background: #f1f5f9; border-radius: 10px; margin-bottom: 15px; border: 1px solid #e2e8f0; }
        .edu-header { padding: 10px 15px; font-weight: bold; color: #1e293b; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; cursor: pointer; }
        .edu-body { padding: 12px 15px; font-size: 13px; color: #475569; line-height: 1.6; }
        .edu-title { display: block; font-weight: 900; color: #2563eb; margin-top: 5px; }

        .highlight-card { background: #fff; border: 2px solid #f1f5f9; padding: 15px; border-radius: 12px; margin-bottom: 15px; text-align: center; }
        .highlight-val { font-size: 32px; font-weight: 900; color: #0f172a; display: block; }
        .highlight-label { font-size: 13px; color: #64748b; }
        
        .top5-item { padding: 9px 12px; font-size: 13px; color: #334155; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; cursor: pointer; border-radius: 6px; }
        .top5-item:hover { background: #eff6ff; color: #2563eb; }
        
        .colorbar-legend { padding: 12px; background: white; border-radius: 8px; width: 220px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); position: absolute; bottom: 25px; right: 15px; z-index: 1000; }
        .colorbar-title { font-size: 13px; font-weight: bold; margin-bottom: 8px; text-align: center; color: #1e293b; }
        .gradient-bar { height: 15px; width: 100%; border-radius: 4px; }
        .high-gradient { background: linear-gradient(to right, #fee0d2, #de2d26); }
        .low-gradient { background: linear-gradient(to right, #deebf7, #3182bd); }
        .bar-labels { display: flex; justify-content: space-between; font-size: 11px; margin-top: 5px; font-weight: bold; color: #64748b; }

        /* 🚨 手機版優化區塊 (RWD) 🚨 */
        @media (max-width: 768px) {
            /* 左上主控制面板微調 */
            .controls { left: 5px; top: 5px; padding: 8px; width: 140px; }
            .controls select, .controls button { padding: 4px; font-size: 11px; margin-bottom: 6px; }
            
            /* 🚨 右上行政區微調，極致壓縮 🚨 */
            .village-control { min-width: 70px; padding: 6px; border-radius: 8px; }
            .village-control b { font-size: 11px; margin-bottom: 4px; padding-left: 5px; border-left-width: 3px; }
            .village-control select { padding: 2px; font-size: 11px; margin-bottom: 4px; height: 24px; }
            
            /* 說明板微調 */
            .info-legend { width: 80vw; left: 5vw; bottom: 13px; }
            .info-legend.collapsed { width: max-content; left: 10px; bottom: 13px; max-width: 80vw; }
            .legend-header h2 { font-size: 12px !important; margin-right: 13px !important; }
            .highlight-val { font-size: 20px; }
            
            /* 色階條微調 */
            .colorbar-legend { bottom: 75px; top: auto; right: 10px; width: 140px; padding: 8px; }
            .colorbar-title { font-size: 11px; margin-bottom: 5px; }
        }
    </style>
</head>
<body>

    <div class="controls">
        <div style="display: flex; justify-content: space-between;">
            <button onclick="getLocation()">📍 定位位置</button>
            <button onclick="goHome()">🏠 返回</button>
        </div>
        
        <select id="basemap-select" onchange="changeBaseLayer(this.value)">
            <option value="esri" selected>🛰️ 衛星影像</option>
            <option value="osm">🛣️ 街道地圖</option>
        </select>

        <select id="time-select" onchange="updateClimateLayer()">
            <option value="Short" selected>短期 (2021-2040)</option>
            <option value="Mid">中期 (2041-2060)</option>
            <option value="Long">長期 (2081-2100)</option>
        </select>

        <select id="ssp-select" onchange="updateClimateLayer()">
            <option value="126" selected>情境：SSP1-2.6</option>
            <option value="245">情境：SSP2-4.5</option>
            <option value="370">情境：SSP3-7.0</option>
            <option value="585">情境：SSP5-8.5</option>
        </select>
        
        <select id="type-select" onchange="updateClimateLayer()">
            <option value="high" selected>高溫日數 (≧35°C)</option>
            <option value="low">低溫日數 (≦15°C)</option>
        </select>
    </div>
    
    <div id="map"></div>

    <div class="info-legend">
        <div class="legend-header" onclick="toggleMain()">
            <h2 style="margin:0; font-size:16px;">氣候潛勢溫度分析說明板</h2>
            <span id="main-icon">收合</span>
        </div>
        <div id="main-content">
            <div class="edu-section">
                <div class="edu-header" onclick="toggleEdu()">
                    <span>💡 分析指標：解讀指南</span>
                    <span id="edu-icon">▼</span>
                </div>
                <div class="edu-body" id="edu-body" style="display: none;">
                    <span class="edu-title">● 高溫日數</span>
                    指該區域日最高溫大於35°C的平均天數。
                    <span class="edu-title">● 低溫日數</span>
                    指該區域日最低溫小於15°C的平均天數。
                    <span class="edu-title">● 空間分布指標</span>
                    依據 TaiESM1 模型推估各地區在不同氣候情境下（SSP1-2.6 至 SSP5-8.5）受溫度影響之潛勢分佈。
                </div>
            </div>

            <div class="highlight-card">
                <span class="highlight-label" id="current-layer-name">全場景模擬最大值</span>
                <span class="highlight-val" id="current-max-val">--</span>
                <span class="highlight-label">模擬最大值 (天)</span>
            </div>
            
            <div style="margin-bottom:10px;">
                <b style="font-size:14px;">🚩 風險排行榜 (里)</b>
            </div>
            <div id="top5-list">資料計算中...</div>
            
            <div style="font-size:11px; color:#94a3b8; margin-top:15px; text-align:center; border-top:1px solid #f1f5f9; padding-top:10px;">
                嘉義市韌性防災計畫 ｜ 中正大學學研團隊
            </div>
        </div>
    </div>

    <div class="colorbar-legend">
        <div id="high-bar-box" style="display:block;">
            <div class="colorbar-title">🌡️ 高溫預估天數色階</div>
            <div class="gradient-bar high-gradient"></div>
            <div class="bar-labels">
                <span id="h-min-val">--</span><span>(天)</span><span id="h-max-val">--</span>
            </div>
        </div>
        <div id="low-bar-box" style="display:none;">
            <div class="colorbar-title">❄️ 低溫預估天數色階</div>
            <div class="gradient-bar low-gradient"></div>
            <div class="bar-labels">
                <span id="l-min-val">--</span><span>(天)</span><span id="l-max-val">--</span>
            </div>
        </div>
    </div>

    <script>
        var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OSM' });
        var esri = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: '© Esri' });

        var map = L.map('map', { center: [23.48, 120.45], zoom: 13, layers: [esri], zoomControl: false });
        L.control.zoom({ position: 'topright' }).addTo(map);

        var climateGroup = L.layerGroup().addTo(map);   
        var highlightLayer = L.layerGroup().addTo(map); 

        var groups = { Short: { high: {}, low: {} }, Mid: { high: {}, low: {} }, Long: { high: {}, low: {} } };
        ["Short", "Mid", "Long"].forEach(p => {
            ["high", "low"].forEach(t => {
                ["126", "245", "370", "585"].forEach(s => { groups[p][t][s] = L.layerGroup(); });
            });
        });

        var villageLayer; 
        var currentVillageStats = {};
        var currentGlobalMax = 0;

        function changeBaseLayer(type) {
            if (type === 'osm') { map.addLayer(osm); map.removeLayer(esri); } 
            else { map.addLayer(esri); map.removeLayer(osm); }
        }

        fetch('chiayi_boundary.geojson').then(res => res.json()).then(data => {
            villageLayer = data; 
            L.geoJSON(data, {
                style: { color: "#333", weight: 1.5, fill: false, opacity: 0.6 },
                interactive: false 
            }).addTo(map);
            calculateCurrentStats();
        });

        var villageControl = L.control({position: 'topright'});
        villageControl.onAdd = function() {
            var div = L.DomUtil.create('div', 'village-control'); 
            div.innerHTML = `
                <b>🔍 行政區快搜</b>
                <select id="district-select" onchange="updateVillageDropdown(this.value)">
                    <option value="">-- 請選擇區 --</option>
                    <option value="東區">東區</option>
                    <option value="西區">西區</option>
                </select>
                <select id="village-search-select" onchange="zoomToVillage(this.value)" disabled>
                    <option value="">-- 請先選擇區 --</option>
                </select>
            `;
            L.DomEvent.disableClickPropagation(div);
            return div;
        };
        villageControl.addTo(map);

        function updateVillageDropdown(districtName) {
            var vSelect = document.getElementById('village-search-select');
            vSelect.innerHTML = '<option value="">-- 請選擇里別 --</option>';
            if (!districtName) {
                vSelect.disabled = true;
                highlightLayer.clearLayers(); 
                return;
            }
            var filteredVillages = villageLayer.features.filter(function(f) {
                return f.properties.TOWNNAME === districtName || f.properties.DISTRICT === districtName;
            });
            var names = filteredVillages.map(f => f.properties.VILLNAME).sort();
            if (names.length > 0) {
                vSelect.disabled = false;
                names.forEach(name => {
                    var opt = document.createElement('option');
                    opt.value = name; opt.innerHTML = name;
                    vSelect.appendChild(opt);
                });
            }
        }

        function zoomToVillage(name) {
            if (!name) { highlightLayer.clearLayers(); return; }
            highlightLayer.clearLayers();
            var target = L.geoJSON(villageLayer, {
                filter: function(f) { return f.properties.VILLNAME === name; },
                style: { color: "#FFFF00", weight: 6, fill: true, fillOpacity: 0.2, interactive: false }
            }).addTo(highlightLayer);
            
            if (target.getBounds().isValid()) {
                map.fitBounds(target.getBounds(), { padding: [20, 20] }); 
                document.getElementById('current-layer-name').innerText = name + " 里內最大預估";
                var maxVal = currentVillageStats[name] || 0;
                // 改為整數
                document.getElementById('current-max-val').innerText = Math.round(maxVal);
            }
        }

        var colorScaleHigh = d3.scaleSequential(d3.interpolateReds);
        var colorScaleLow = d3.scaleSequential(d3.interpolateBlues);

        function processAndRender(data, fieldName, colorScale, group) {
            const values = data.features.map(f => f.properties[fieldName]).filter(v => v != null);
            if (values.length > 0) colorScale.domain([Math.min(...values), Math.max(...values)]);

            L.geoJSON(data, {
                interactive: true, 
                style: function (f) {
                    return { fillColor: colorScale(f.properties[fieldName]), weight: 0.5, opacity: 0.5, color: 'white', fillOpacity: 0.75 };
                },
                onEachFeature: function(f, layer) {
                    layer.on('click', function(e) {
                        if (!villageLayer) return;
                        var localVal = f.properties[fieldName] || 0;
                        
                        var pt = turf.point([e.latlng.lng, e.latlng.lat]);
                        var clickedVName = null;
                        var clickedVFeat = null;
                        var distName = null;

                        for (var i = 0; i < villageLayer.features.length; i++) {
                            if (turf.booleanPointInPolygon(pt, villageLayer.features[i])) {
                                clickedVFeat = villageLayer.features[i];
                                clickedVName = clickedVFeat.properties.VILLNAME || clickedVFeat.properties.里名;
                                distName = clickedVFeat.properties.TOWNNAME || clickedVFeat.properties.DISTRICT;
                                break;
                            }
                        }

                        if (clickedVName) {
                            var vMaxVal = currentVillageStats[clickedVName] || 0;

                            highlightLayer.clearLayers();
                            L.geoJSON(clickedVFeat, {
                                style: { color: "#FFFF00", weight: 6, fillOpacity: 0.2, opacity: 1 },
                                interactive: false
                            }).addTo(highlightLayer);

                            // 更新左下角面板 (改為整數)
                            document.getElementById('current-layer-name').innerText = clickedVName + " 里內最大預估";
                            document.getElementById('current-max-val').innerText = Math.round(vMaxVal);

                            // 🚨 連動右上角選單 🚨
                            var distSelect = document.getElementById('district-select');
                            var villSelect = document.getElementById('village-search-select');
                            
                            if (distSelect && distName) {
                                distSelect.value = distName;
                                updateVillageDropdown(distName); 
                            }
                            if (villSelect && clickedVName) {
                                villSelect.value = clickedVName;
                            }

                            // 顯示詳細 Popup (皆改為整數)
                            L.popup()
                                .setLatLng(e.latlng)
                                .setContent(`<div style="font-size:14px; font-family:'Microsoft JhengHei'; line-height:1.5;">
                                    <b style="font-size:16px;">${clickedVName}</b><br>
                                    📍 此點位預估值：<span style="font-weight:bold;">${Math.round(localVal)}</span> 天<br>
                                    🚩 里內最大值：<span style="color:red; font-weight:bold;">${Math.round(vMaxVal)}</span> 天
                                </div>`)
                                .openOn(map);
                        } else {
                            L.popup().setLatLng(e.latlng).setContent(`點位預估值：${Math.round(localVal)} 天`).openOn(map);
                        }
                        
                        L.DomEvent.stopPropagation(e);
                    });
                }
            }).addTo(group);
        }

        const datasets = [
            { file: 'SSP126_Short_21_40_high.geojson', period: 'Short', type: 'high', ssp: '126', scale: colorScaleHigh },
            { file: 'SSP245_Short_21_40_high.geojson', period: 'Short', type: 'high', ssp: '245', scale: colorScaleHigh },
            { file: 'SSP370_Short_21_40_high.geojson', period: 'Short', type: 'high', ssp: '370', scale: colorScaleHigh },
            { file: 'SSP585_Short_21_40_high.geojson', period: 'Short', type: 'high', ssp: '585', scale: colorScaleHigh },
            { file: 'SSP126_Short_21_40_low.geojson',  period: 'Short', type: 'low',  ssp: '126', scale: colorScaleLow },
            { file: 'SSP245_Short_21_40_low.geojson',  period: 'Short', type: 'low',  ssp: '245', scale: colorScaleLow },
            { file: 'SSP370_Short_21_40_low.geojson',  period: 'Short', type: 'low',  ssp: '370', scale: colorScaleLow },
            { file: 'SSP585_Short_21_40_low.geojson',  period: 'Short', type: 'low',  ssp: '585', scale: colorScaleLow },
            { file: 'SSP126_Mid_41_60_high.geojson',   period: 'Mid',   type: 'high', ssp: '126', scale: colorScaleHigh },
            { file: 'SSP245_Mid_41_60_high.geojson',   period: 'Mid',   type: 'high', ssp: '245', scale: colorScaleHigh },
            { file: 'SSP370_Mid_41_60_high.geojson',   period: 'Mid',   type: 'high', ssp: '370', scale: colorScaleHigh },
            { file: 'SSP585_Mid_41_60_high.geojson',   period: 'Mid',   type: 'high', ssp: '585', scale: colorScaleHigh },
            { file: 'SSP126_Mid_41_60_low.geojson',    period: 'Mid',   type: 'low',  ssp: '126', scale: colorScaleLow },
            { file: 'SSP245_Mid_41_60_low.geojson',    period: 'Mid',   type: 'low',  ssp: '245', scale: colorScaleLow },
            { file: 'SSP370_Mid_41_60_low.geojson',    period: 'Mid',   type: 'low',  ssp: '370', scale: colorScaleLow },
            { file: 'SSP585_Mid_41_60_low.geojson',    period: 'Mid',   type: 'low',  ssp: '585', scale: colorScaleLow },
            { file: 'SSP370_Long_81_00_high.geojson',  period: 'Long',  type: 'high', ssp: '370', scale: colorScaleHigh },
            { file: 'SSP370_Long_81_00_low.geojson',   period: 'Long',  type: 'low',  ssp: '370', scale: colorScaleLow }
        ];

        datasets.forEach(d => {
            fetch(d.file).then(res => res.json()).then(data => {
                processAndRender(data, 'days', d.scale, groups[d.period][d.type][d.ssp]);
            }).catch(e => console.log(d.file + " 資料未就緒"));
        });

        function calculateCurrentStats() {
            var time = document.getElementById('time-select').value;
            var ssp = document.getElementById('ssp-select').value;
            var type = document.getElementById('type-select').value;
            var targetGroup = groups[time][type][ssp];
            
            if (!targetGroup || !villageLayer) return;
            var layers = targetGroup.getLayers();
            if(layers.length === 0) { setTimeout(calculateCurrentStats, 300); return; }

            var feats = layers[0].toGeoJSON().features;
            currentVillageStats = {};
            currentGlobalMax = 0;

            var sortedClimateFeats = feats.slice().sort((a,b) => {
                var va = a.properties.days || 0; var vb = b.properties.days || 0;
                if(va > currentGlobalMax) currentGlobalMax = va;
                if(vb > currentGlobalMax) currentGlobalMax = vb;
                return vb - va;
            });

            villageLayer.features.forEach(vFeat => {
                var vName = vFeat.properties.VILLNAME || vFeat.properties.里名;
                var foundMax = 0;
                
                for(var i = 0; i < sortedClimateFeats.length; i++) {
                    var cFeat = sortedClimateFeats[i];
                    if (cFeat.properties.days == null) continue;
                    try {
                        if (turf.booleanIntersects(vFeat, cFeat)) {
                            foundMax = cFeat.properties.days;
                            break; 
                        }
                    } catch (e) {
                        if (turf.booleanPointInPolygon(turf.centroid(cFeat), vFeat)) {
                            foundMax = cFeat.properties.days; break;
                        }
                    }
                }
                currentVillageStats[vName] = foundMax;
            });

            document.getElementById('current-layer-name').innerText = "全場景模擬最大值";
            // 改為整數
            document.getElementById('current-max-val').innerText = Math.round(currentGlobalMax);

            var statsArray = Object.entries(currentVillageStats)
                .map(([name, max]) => ({name, max}))
                .sort((a,b) => b.max - a.max);

            var top5Html = "";
            var displayRank = 1;
            for (var i = 0; i < statsArray.length; i++) {
                if (i > 0 && statsArray[i].max < statsArray[i-1].max) { displayRank = i + 1; }
                if (displayRank > 5) break;
                top5Html += `
                    <div class="top5-item" onclick="zoomToVillage('${statsArray[i].name}')">
                        <span>${displayRank}. ${statsArray[i].name}</span>
                        <b>${Math.round(statsArray[i].max)} 天</b>
                    </div>`; // 排行榜改為整數
            }
            document.getElementById('top5-list').innerHTML = top5Html;
        }

        function updateClimateLayer() {
            var time = document.getElementById('time-select').value;
            var sspSelect = document.getElementById('ssp-select');
            var sspOptions = sspSelect.options; 

            if (time === 'Long') {
                for (var i = 0; i < sspOptions.length; i++) {
                    if (sspOptions[i].value !== '370') {
                        sspOptions[i].disabled = true;  
                        sspOptions[i].text = sspOptions[i].value + " (無資料)"; 
                    } else {
                        sspOptions[i].disabled = false; sspOptions[i].selected = true; sspOptions[i].text = "SSP" + sspOptions[i].value;
                    }
                }
            } else {
                for (var i = 0; i < sspOptions.length; i++) { sspOptions[i].disabled = false; sspOptions[i].text = "SSP" + sspOptions[i].value; }
            }

            var ssp = sspSelect.value; 
            var type = document.getElementById('type-select').value;

            climateGroup.clearLayers();
            var target = groups[time][type][ssp];
            if (target) {
                climateGroup.addLayer(target);
                updateColorBar(target, type); 
                calculateCurrentStats();
            }
        }

        function updateColorBar(group, type) {
            var layers = group.getLayers();
            if (layers.length > 0) {
                var feats = layers[0].toGeoJSON().features;
                var vs = feats.map(f => f.properties.days).filter(v => v != null);
                if (vs.length > 0) {
                    var minV = Math.round(Math.min(...vs)), maxV = Math.round(Math.max(...vs)); // 色階改為整數
                    if (type === 'high') {
                        document.getElementById('high-bar-box').style.display = 'block';
                        document.getElementById('low-bar-box').style.display = 'none';
                        document.getElementById('h-min-val').innerText = minV; document.getElementById('h-max-val').innerText = maxV;
                    } else {
                        document.getElementById('low-bar-box').style.display = 'block';
                        document.getElementById('high-bar-box').style.display = 'none';
                        document.getElementById('l-min-val').innerText = minV; document.getElementById('l-max-val').innerText = maxV;
                    }
                }
            }
        }

        map.on('click', function(e) {
            highlightLayer.clearLayers();
            document.getElementById('current-layer-name').innerText = "全場景模擬最大值";
            if(currentGlobalMax > 0) document.getElementById('current-max-val').innerText = Math.round(currentGlobalMax);
        });

        function goHome() {
            map.flyTo([23.48, 120.45], 13);
            highlightLayer.clearLayers();
            document.getElementById('current-layer-name').innerText = "全場景模擬最大值";
            if(currentGlobalMax > 0) document.getElementById('current-max-val').innerText = Math.round(currentGlobalMax);
            var dSelect = document.getElementById('district-select');
            if(dSelect) dSelect.value = "";
            var vSelect = document.getElementById('village-search-select');
            if(vSelect) { vSelect.innerHTML = '<option value="">-- 請先選擇區 --</option>'; vSelect.disabled = true; }
        }

        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    var lat = pos.coords.latitude; var lon = pos.coords.longitude;
                    L.marker([lat, lon]).addTo(map).bindPopup("您目前的 GPS 位置").openPopup();
                    map.setView([lat, lon], 15);
                }, () => alert("無法取得位置，請檢查設備設定。"));
            }
        }

        function toggleMain() {
            var c = document.getElementById("main-content"); var icon = document.getElementById("main-icon");
            if (c.style.display === "none") { c.style.display = "block"; icon.innerText = "收合"; } 
            else { c.style.display = "none"; icon.innerText = "展開"; }
        }

        function toggleEdu() {
            var c = document.getElementById("edu-body"); var icon = document.getElementById("edu-icon");
            if (c.style.display === "none") { c.style.display = "block"; icon.innerText = "▲"; } 
            else { c.style.display = "none"; icon.innerText = "▼"; }
        }

        setTimeout(updateClimateLayer, 800);
    </script>
</body>
</html>
